name: release-cos
run-name: Release ${{ github.event_name == 'push' && github.ref_name || format('v{0}', inputs.version) }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.3.62)"
        required: true
        type: string
      promote_stable:
        description: "Also promote /stable to this version"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Dry-run (no COS writes)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-cos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Sync clickzetta-skills
        shell: bash
        run: |
          set -x
          WORK_DIR="$(pwd)"
          SKILLS_SRC="$(mktemp -d)/clickzetta-skills"
          curl -sSL --retry 3 --retry-delay 5 --max-time 60 https://github.com/clickzetta/clickzetta-skills/archive/refs/heads/main.tar.gz | tar -xz -C "$(dirname "$SKILLS_SRC")"
          mv "$(dirname "$SKILLS_SRC")/clickzetta-skills-main" "$SKILLS_SRC"
          mkdir -p "$WORK_DIR/skills/external"
          count=0
          for name in $(ls "$SKILLS_SRC" | grep '^clickzetta-'); do
            if [ -f "$SKILLS_SRC/$name/SKILL.md" ]; then
              cp -r "$SKILLS_SRC/$name" "$WORK_DIR/skills/external/$name"
              count=$((count + 1))
            fi
          done
          echo "Synced $count skills"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Build all targets (cross-compile)
        env:
          OPENCODE_VERSION: ${{ steps.version.outputs.version }}
          CLICKZETTA_OTEL_ENDPOINT: ${{ secrets.CLICKZETTA_OTEL_ENDPOINT }}
          CLICKZETTA_OTEL_HEADERS: ${{ secrets.CLICKZETTA_OTEL_HEADERS }}
        run: |
          cd packages/opencode
          bun run script/build.ts

      - name: Publish to COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          ARGS=(
            --version "${{ steps.version.outputs.version }}"
            --dist packages/opencode/dist
            --git-sha "${{ github.sha }}"
            --build-date "${{ steps.version.outputs.build_date }}"
          )
          if [ "${{ inputs.promote_stable }}" = "true" ]; then
            ARGS+=(--promote-stable)
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          bun run scripts/cos-release.mjs "${ARGS[@]}"
