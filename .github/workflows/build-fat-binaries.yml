name: Build Fat Binaries
run-name: Build Fat Binaries ${{ github.event_name == 'push' && github.ref_name || format('v{0}', inputs.version || 'manual') }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "CLI version from cz_cli/version.py"
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
            target: linux-x86_64
          - os: windows-latest
            python-version: "3.11"
            target: windows-x86_64
          - os: macos-13
            python-version: "3.11"
            target: macos-x86_64
          - os: macos-14
            python-version: "3.11"
            target: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt pyinstaller

      - name: Build standalone binary
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --clean pyinstaller/cz-cli.spec
          mkdir -p "dist/${{ matrix.target }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            mv "dist/cz-cli.exe" "dist/${{ matrix.target }}/cz-cli.exe"
          else
            mv "dist/cz-cli" "dist/${{ matrix.target }}/cz-cli"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.target }}/cz-cli*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub release with binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/linux-x86_64/cz-cli
            dist/windows-x86_64/cz-cli.exe
            dist/macos-x86_64/cz-cli
            dist/macos-arm64/cz-cli
