name: release
run-name: Release ${{ github.event_name == 'push' && github.ref_name || format('v{0}', inputs.version || 'manual') }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --repo "${{ github.repository }}" || true

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: linux
            runner: ubuntu-24.04-arm
          - os: darwin
            runner: macos-latest
          - os: darwin
            runner: macos-15-intel
          - os: win32
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync clickzetta-skills
        shell: bash
        run: |
          git clone --depth 1 --branch main https://github.com/clickzetta/clickzetta-skills.git /tmp/clickzetta-skills
          ls /tmp/clickzetta-skills/ | head -20
          mkdir -p skills/external
          for dir in /tmp/clickzetta-skills/clickzetta-*/; do
            [ -f "$dir/SKILL.md" ] && cp -r "$dir" skills/external/
          done
          echo "Synced $(ls -d skills/external/clickzetta-* 2>/dev/null | wc -l) skills from clickzetta-skills repo"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        timeout-minutes: 10
        run: bun install

      - name: Build and upload ${{ matrix.os }} targets
        env:
          OPENCODE_VERSION: ${{ needs.create-release.outputs.version }}
          OPENCODE_RELEASE: "1"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd packages/opencode && bun run script/build.ts

  upload-installer:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload install script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            scripts/install.sh \
            --clobber --repo "${{ github.repository }}"

  publish-npm:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          mkdir -p artifacts
          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64 win32-x64; do
            mkdir -p "artifacts/cz-cli-${platform}/bin"
            # Asset names use "windows" not "win32"
            asset_platform="${platform/win32/windows}"
            if [ "$platform" = "linux-arm64" ] || [ "$platform" = "linux-x64" ]; then
              gh release download "$TAG" \
                --pattern "cz-cli-${asset_platform}.tar.gz" \
                --dir artifacts --repo "${{ github.repository }}"
              tar -xzf "artifacts/cz-cli-${asset_platform}.tar.gz" -C "artifacts/cz-cli-${platform}"
              mv "artifacts/cz-cli-${platform}/cz-cli" "artifacts/cz-cli-${platform}/bin/cz-cli"
            else
              gh release download "$TAG" \
                --pattern "cz-cli-${asset_platform}.zip" \
                --dir artifacts --repo "${{ github.repository }}"
              unzip -o "artifacts/cz-cli-${asset_platform}.zip" -d "artifacts/cz-cli-${platform}"
              if [ "$platform" = "win32-x64" ]; then
                mv "artifacts/cz-cli-${platform}/cz-cli.exe" "artifacts/cz-cli-${platform}/bin/cz-cli.exe" 2>/dev/null || \
                mv "artifacts/cz-cli-${platform}/cz-cli" "artifacts/cz-cli-${platform}/bin/cz-cli.exe"
              else
                mv "artifacts/cz-cli-${platform}/cz-cli" "artifacts/cz-cli-${platform}/bin/cz-cli"
              fi
            fi
          done

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          scripts/npm-publish.sh "${{ needs.create-release.outputs.version }}" artifacts
