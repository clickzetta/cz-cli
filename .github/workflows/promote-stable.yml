name: promote-stable
run-name: Promote ${{ inputs.version }} to /stable

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to promote (must already be on COS)"
        required: true
        type: string
      dry_run:
        description: "Dry-run (verify only, no write)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: promote-stable
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure local Node headers for node-gyp
        shell: bash
        run: |
          echo "npm_config_nodedir=$(node -p "require('path').dirname(require('path').dirname(process.execPath))")" >> "$GITHUB_ENV"

      - name: Install root devDependencies (only what cos scripts need)
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Promote
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          ARGS=(--channel stable --version "${{ inputs.version }}")
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          bun run scripts/cos-promote.mjs "${ARGS[@]}"
