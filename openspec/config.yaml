schema: spec-driven

context: |
  Tech stack: TypeScript, Bun, Node.js, Shell (bash)
  Monorepo layout:
    packages/opencode/        — 主 CLI 二进制（bun compile 产物）
    packages/npm/cz-cli/      — npm 分发包（postinstall.js 负责下载平台二进制）
    scripts/install.sh        — curl | sh 安装脚本
    script/build.ts           — CI 构建脚本，产出平台二进制并上传到 GitHub Release
    .github/workflows/        — GitHub Actions，release-cos.yml 驱动构建发布

  Spec coverage — before touching these areas, read the corresponding spec:
    install/update 流程、自动更新、渠道选择  → openspec/specs/auto-update/spec.md
    发布渠道（stable/nightly）、install.json  → openspec/specs/release-channel/spec.md
    macOS Gatekeeper、quarantine、codesign    → openspec/specs/macos-gatekeeper/spec.md
    skill 分发（内置 .builtin、外部 agent 注册）→ openspec/specs/skill-install/spec.md
    CLI 顶层命令路由、agent runtime 透出 → openspec/specs/cli-command-routing/spec.md
    setup 交互式引导、账号站点 credential 流程 → openspec/specs/setup/spec.md
    MoA(Mixture of Agents)配置来源与解析      → openspec/specs/moa-config/spec.md

  Areas NOT yet covered by specs (create a new spec when changing):
    GitHub Actions workflow (release-cos.yml, build targets, upload steps)
    Windows 签名 (script/sign-windows.ps1)
    COS 发布 (scripts/cos-release.mjs, scripts/cos-upload.mjs)
    npm 包结构 (packages/npm/cz-cli/bin/platform.js, prepare-release-assets.mjs)

  Commit convention: Conventional Commits (fix/feat/docs/chore/refactor/test)
  Language: 代码注释和 commit message 用英文；spec/design 文档用中文

agent_contract:
  canonical_file: openspec/config.yaml
  agents_md_policy:
    root_agents_md: "AGENTS.md 只作为入口壳，指向 openspec/config.yaml。不要在 AGENTS.md 中复制长期契约内容。"
  repository:
    default_branch: main
    javascript_sdk_regeneration: "./packages/sdk/js/script/build.ts"
    tool_usage: "ALWAYS USE PARALLEL TOOLS WHEN APPLICABLE."
    automation: "Prefer automation: execute requested actions without confirmation unless blocked by missing info or safety/irreversibility."
    commit:
      convention: "Conventional Commits (fix/feat/docs/chore/refactor/test)"
      co_author_trailer: "Co-Authored-By: cz-cli <noreply@clickzetta.com>"
  command_discovery:
    help_contract: "Use `cz-cli <command> --help` to discover exact command parameters, including command-specific common flags such as --limit and --no-limit."
    global_options:
      order: "Global options appear before subcommand unless a command documents otherwise."
      examples:
        - "cz-cli --profile dev sql \"SELECT 1\""
        - "cz-cli ai-gateway model list <key-or-alias> --limit 10"
  output_contract:
    ai_message: "Structured success/error payloads may include `ai_message`; this field is the agent-facing next-step or truncation guidance and should be preserved in agent documentation."
    field_naming: "User-facing CLI output MUST use product/domain-friendly names instead of backend DTO/MVC/internal API names. Keep raw backend field names only under explicitly named raw/debug/save payload sections when needed."
    enum_labels: "Whenever user-facing output includes numeric or string magic values, also expose a stable human-readable enum/label field next to the raw value, for example *_label, *_name, or *_type_name."
    table_first_shape: "When designing command output, consider `--format table` first: important user-facing data SHOULD be flattened into row/column-friendly fields at the primary output level. Avoid hiding key values inside nested objects or arrays unless they are raw/debug/save payload details."
    empty_strings: "Preserve empty strings as empty strings in CLI output. Do not replace empty strings with placeholder values such as '-' unless the command explicitly documents that placeholder."
  development_workflow:
    policy: "This project uses spec-driven development with TDD. Do not skip the order below for behavior changes."
    steps:
      - "Read openspec/config.yaml."
      - "Identify the relevant spec from the Spec coverage map; create a spec first if the area is uncovered or unclear."
      - "Update or create openspec/specs/<topic>/spec.md in 中文 with WHEN/THEN scenarios."
      - "Write or update tests that verify the spec scenarios."
      - "Implement the code change to pass the tests and satisfy the spec."
      - "Commit spec, tests, and code together."
    behavior_changes_requiring_spec:
      - "install/update/postinstall logic"
      - "binary placement, signing, or permission changes"
      - "GitHub Actions build or release steps"
      - "version resolution, channel selection, or auto-update logic"
      - "new CLI command or flag"
    spec_not_required:
      - "pure refactors with no observable behavior change"
      - "typo fixes, comment updates, or log message wording"
      - "test-only changes that add coverage for existing spec scenarios"
  style_guide:
    general:
      - "Keep things in one function unless composable or reusable."
      - "Avoid try/catch where possible."
      - "Avoid using the any type."
      - "Use Bun APIs when possible, such as Bun.file()."
      - "Rely on type inference; avoid explicit annotations or interfaces unless necessary for exports or clarity."
      - "Prefer functional array methods over for loops; use type guards on filter to preserve downstream inference."
      - "In src/config, follow the existing self-export pattern at the top of the file when adding a config module."
      - "Reduce variable count by inlining values used only once."
    destructuring: "Avoid unnecessary destructuring; use dot notation to preserve context."
    variables: "Prefer const over let; use ternaries or early returns instead of reassignment."
    control_flow: "Avoid else statements; prefer early returns."
    drizzle_schema: "Use snake_case field names so column names do not need string redefinitions."
  verification:
    policy: "Never claim a fix works without running it."
    after_code_change:
      - "Run relevant tests from the affected package, for example `cd packages/opencode && bun test <test-file>` or the closest package/test for changed code."
      - "Run `bun typecheck` from the affected package directory."
      - "If install/update/CLI binary logic changed, build a local binary and smoke-test the affected command."
      - "For shell script changes, run `bash -n` and test the specific function with `bash -x`."
      - "For macOS signing/quarantine changes, verify with `codesign -dvv <binary>` and `xattr -l <binary>` after install."
    debugging:
      - "Do not guess root cause from source reading alone; run the code and capture actual output."
      - "Use bash -x or set -x for shell failures."
      - "For TypeScript runtime errors, capture the actual execution path."
      - "For binary/Gatekeeper issues, use `spctl -a -v <binary>` and `codesign -dvv <binary>`."
      - "If a command fails, show the actual error output before proposing a fix."
    done_definition:
      - "Tests pass, with output shown."
      - "Typecheck passes, with output shown."
      - "Actual behavior matches the spec scenario, with command and output shown."
  testing:
    - "Avoid mocks as much as possible."
    - "Test actual implementation; do not duplicate logic into tests."
    - "Tests cannot run from repo root; run from package directories such as packages/opencode or the affected package."
  typechecking:
    - "Always run `bun typecheck` from package directories; never run tsc directly."

rules:
  spec:
    - 用中文写作
    - 需求用 WHEN/THEN 格式描述场景
    - 每个需求至少包含一个正向场景和一个边界/异常场景
  tasks:
    - 每个 task 对应一个可独立验证的改动（单文件或单函数粒度优先）
    - task 描述包含受影响的文件路径
